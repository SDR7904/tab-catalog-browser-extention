<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Tab Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div class="app">
    <header class="app-header">
      <div class="tab-flag-logo">T</div>
      <div class="header-text">
        <h1>Tab Catalog</h1>
        <p id="tab-count">Reading open tabs…</p>
      </div>
    </header>

    <div id="tab-list" class="tab-list" aria-live="polite"></div>

    <footer class="app-footer">
      <button id="download-btn" class="btn-primary" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v13" />
          <path d="m7 11 5 5 5-5" />
          <path d="M5 21h14" />
        </svg>
        <span id="download-label">Download as HTML</span>
      </button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>

</html>
